services:
  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    container_name: wealthsense-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/wealthsense
      - REDIS_URL=redis://redis:6379/0
      - DEBUG=true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - wealthsense

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: wealthsense-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - wealthsense

  postgres:
    image: postgres:15-alpine
    container_name: wealthsense-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: wealthsense
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - wealthsense

  redis:
    image: redis:7-alpine
    container_name: wealthsense-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - wealthsense

volumes:
  postgres_data:

networks:
  wealthsense:
    driver: bridge
